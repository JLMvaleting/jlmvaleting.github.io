<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get a Quote - JLM Valeting</title>

<style>
body{margin:0;font-family:'Inter',sans-serif;background:#020617;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}

.container{width:90%;max-width:1000px;display:grid;grid-template-columns:1fr 1fr;background:linear-gradient(145deg,#020617,#0f172a);border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6)}

.left{padding:50px}
.left h1{font-size:40px;margin-bottom:10px}
.left p{color:#cbd5f5}

.box{background:#020617;padding:18px;border-radius:12px;margin-top:20px;border:1px solid rgba(255,255,255,0.05)}
.box h3{margin:0;color:#2563eb;font-size:16px}

.right{padding:50px;background:#0b1220}

input, textarea{width:100%;padding:14px;margin-bottom:15px;border:none;border-radius:10px;background:#020617;color:#fff;outline:none}
input:focus, textarea:focus{border:1px solid #2563eb}

button{width:100%;padding:15px;background:#2563eb;border:none;color:#fff;border-radius:12px;font-weight:600;cursor:pointer;transition:0.3s;display:flex;justify-content:center;align-items:center;gap:10px}
button:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(37,99,235,0.6)}
button.loading{opacity:0.7;pointer-events:none}

.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top:2px solid #fff;border-radius:50%;animation:spin 0.6s linear infinite;display:none}
button.loading .spinner{display:inline-block}

.success{color:#22c55e;margin-top:10px;opacity:0;transform:translateY(10px);transition:0.4s}
.success.show{opacity:1;transform:translateY(0)}

.error{color:#ef4444;margin-top:10px}

@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){.container{grid-template-columns:1fr}}

/* WhatsApp button styling */
.whatsapp-btn{
  display:inline-block;
  background:#25D366;
  color:#fff;
  padding:12px 18px;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
  margin-top:10px;
  transition:0.3s;
}
.whatsapp-btn:hover{
  background:#1ebe5d;
  transform:translateY(-2px);
  box-shadow:0 0 15px rgba(37,211,102,0.6);
}

/* Call button styling */
.call-btn{
  display:none;
  background:#2563eb;
  color:#fff;
  padding:12px 18px;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
  margin-top:10px;
  text-align:center;
  transition:0.3s;
}
.call-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 15px rgba(37,99,235,0.6);
}

/* Show only on mobile */
@media(max-width:768px){
  .call-btn{
    display:inline-block;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="left">
<h1>Let's Talk</h1>
<p>Get in touch for a quote or enquiry</p>

<div class="box"><h3>Email</h3><p>contact@jlmvaleting.co.uk</p></div>

<div class="box">
<h3>Phone</h3>
<a href="tel:+447404930763" class="call-btn">📞Tap to Call</a>
</div>

<div class="box">
<h3>WhatsApp</h3>
<a href="https://wa.me/447404930763?text=Hi%20I'm%20looking%20for%20a%20quote" target="_blank" class="whatsapp-btn">
💬 Chat on WhatsApp
</a>
</div>

</div>

<div class="right">

<form id="quote-form" action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="d06c7535-b6cf-427d-b38e-4846f6e1a002">

<input type="text" name="name" placeholder="Your Name" required>
<span></span>

<input type="email" name="email" placeholder="Your Email" required>
<span></span>

<input type="text" name="phone" placeholder="Your Phone Number">

<input type="text" name="address" placeholder="Your Address">

<input type="text" name="postcode" placeholder="Your Postcode">  
  
<input type="text" name="vehicle" placeholder="Vehicle Make & Model">

<textarea name="message" placeholder="Your Message"></textarea>
<span></span>

<input type="hidden" name="subject" value="New Quote Request - JLM Valeting">

<button type="submit">
<span>Send Message</span>
<div class="spinner"></div>
</button>

</form>

<p class="success">Message sent successfully!</p>
<p class="error"></p>

</div>

</div>

<script>
const form = document.getElementById("quote-form");
const btn = document.querySelector("button");
const successMsg = document.querySelector(".success");
const errorMsg = document.querySelector(".error");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  btn.classList.add("loading");

  const formData = new FormData(form);

  const response = await fetch("https://api.web3forms.com/submit", {
    method: "POST",
    body: formData
  });

  const result = await response.json();

  btn.classList.remove("loading");

  if (result.success) {
    successMsg.classList.add("show");
    errorMsg.textContent = "";
    form.reset();
  } else {
    errorMsg.textContent = "Something went wrong. Please try again.";
  }
});
</script>

</body>
</html>
